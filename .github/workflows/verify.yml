name: ORL-AI Verify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify frozen demo hash
        shell: bash
        run: |
          expected_demo=$(python - <<'PY'
          from pathlib import Path

          text = Path("VERIFY/FREEZE_DEMO_SHA256.txt").read_text(encoding="utf-8")
          lines = [line.strip() for line in text.splitlines()]

          target = "demo/orl_ai_demo_base_v4_1.py"
          for i, line in enumerate(lines):
              if line == target and i + 2 < len(lines) and lines[i + 1] == "SHA256:":
                  print(lines[i + 2])
                  break
          else:
              raise SystemExit("Could not find frozen hash for demo/orl_ai_demo_base_v4_1.py")
          PY
          )

          actual_demo=$(sha256sum demo/orl_ai_demo_base_v4_1.py | awk '{print $1}')

          echo "Expected demo hash: $expected_demo"
          echo "Actual demo hash:   $actual_demo"

          [ "$actual_demo" = "$expected_demo" ] || (echo "demo hash mismatch" && exit 1)

      - name: Save committed sample output
        run: |
          cp outputs/orl_ai_result_v4_1.json outputs/orl_ai_result_v4_1.sample.json

      - name: Run ORL-AI demo and generate output
        run: |
          python demo/orl_ai_demo_base_v4_1.py --write-output --output outputs/orl_ai_result_v4_1.json

      - name: Verify output content and semantic equivalence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          generated_path = Path("outputs/orl_ai_result_v4_1.json")
          sample_path = Path("outputs/orl_ai_result_v4_1.sample.json")

          generated = json.loads(generated_path.read_text(encoding="utf-8"))
          sample = json.loads(sample_path.read_text(encoding="utf-8"))

          assert generated["core_identity"]["axiom_1"] == "correctness != training + data_order + synchronization"
          assert generated["core_identity"]["axiom_2"] == "decision = resolve(normalize(structure))"

          assert generated["reference_merge"]["state"] == "RESOLVED"
          assert generated["reference_merge"]["decision"] == "Action_Isolate"

          assert generated["replay_merge"]["state"] == "RESOLVED"
          assert generated["replay_merge"]["decision"] == "Action_Isolate"
          assert generated["reference_merge"]["certificate"] == generated["replay_merge"]["certificate"]

          assert generated["conflict_merge"]["state"] == "ABSTAIN"
          assert generated["conflict_merge"]["governance"]["governance_status"] == "REJECTED_CONFLICT"

          assert generated["ambiguity_merge"]["state"] == "ABSTAIN"
          assert generated["ambiguity_merge"]["governance"]["governance_status"] == "REJECTED_AMBIGUITY"

          assert generated["five_node_merge"]["state"] == "RESOLVED"
          assert generated["five_node_merge"]["decision"] == "Action_Approve"

          assert generated["five_node_replay_merge"]["state"] == "RESOLVED"
          assert generated["five_node_replay_merge"]["decision"] == "Action_Approve"
          assert generated["five_node_merge"]["certificate"] == generated["five_node_replay_merge"]["certificate"]

          assert generated["permutation_check"]["checked"] == 6
          assert generated["permutation_check"]["independent"] is True
          assert generated["permutation_check"]["state"] == "RESOLVED"
          assert generated["permutation_check"]["decision"] == "Action_Isolate"

          assert generated["final_checks"]["converged_decision"] is True
          assert generated["final_checks"]["matching_certificate"] is True
          assert generated["final_checks"]["five_node_converged_decision"] is True
          assert generated["final_checks"]["five_node_matching_certificate"] is True
          assert generated["final_checks"]["conflict_governance_stable"] is True
          assert generated["final_checks"]["conflict_capsule_stable"] is True
          assert generated["final_checks"]["dual_approve_overlap_resolved"] is True
          assert generated["final_checks"]["dual_approve_overlap_decision"] is True

          assert generated == sample, "Generated output JSON is not semantically identical to committed sample output JSON"

          print("ORL-AI output content and semantic equivalence verified.")
          PY
